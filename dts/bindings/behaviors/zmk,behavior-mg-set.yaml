#
# Mouse-gesture set activation behavior.
#
# Supports both forms:
#   &mg_set 1    // one-param generic behavior
#   &mg_set_1    // zero-param DYA Studio friendly alias

description: Mouse gesture set activation behavior
compatible: "zmk,behavior-mg-set"

include: behavior-metadata.yaml

properties:
  label:
    type: string
    required: false
    deprecated: true
  "#binding-cells":
    type: int
    required: true
    enum:
      - 0
      - 1

binding-cells:
  - param1
